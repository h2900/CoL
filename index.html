<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Paladin Hub | Lahcen</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&family=Syne:wght@800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <style>
        :root { 
            --teal: #8b6b4c; 
            --border: rgba(255, 255, 255, 0.1); 
            --glass: rgba(10, 15, 20, 0.65); 
            --ios-blur: blur(30px) saturate(180%); 
            --role-bronze: #8b6b4c; 
        }

        body { 
            margin: 0; 
            padding: 0; 
            background: #000 url('paladin-diablo-iv-3840x2160-25956.jpg') no-repeat center center fixed; 
            background-size: cover; 
            color: white; 
            direction: rtl; 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            min-height: 100vh; 
            overflow: hidden; 
        }
        #user-display-name { 
    margin: 0; 
    font-family: 'Syne'; 
    font-size: 2.2rem; 
    letter-spacing: -1px; 
    background: linear-gradient(90deg, #fff, #8b6b4c, #fff);
    background-size: 200%;
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    animation: shine 3s linear infinite;
    filter: drop-shadow(0 0 8px rgba(139, 107, 76, 0.5));
    cursor: pointer;
    position: relative;
}

/* إجبار النص tc0l على الظهور بلون أبيض */
#user-display-name.has-tooltip::after {
    content: "tc0l" !important; /* كتابة الكلمة مباشرة هنا أضمن حل */
    position: absolute;
    bottom: calc(100% + 15px);
    left: 50%;
    transform: translateX(-50%) translateY(10px);
    padding: 8px 16px;
    background: rgba(0, 0, 0, 0.8) !important; /* خلفية غامقة عشان يبان النص */
    border: 1px solid rgba(255, 255, 255, 0.1);
    border-radius: 12px;
    backdrop-filter: blur(15px);
    color: #ffffff !important; 
    font-size: 0.8rem;
    font-weight: 800;
    opacity: 0;
    pointer-events: none;
    transition: 0.3s ease;
    z-index: 9999;
}

#user-display-name.has-tooltip:hover::after { 
    opacity: 1; 
    transform: translateX(-50%) translateY(0); 
}

        #particles-js { 
            position: fixed; 
            top: 0; 
            left: 0; 
            width: 100%; 
            height: 100%; 
            z-index: 1; 
        }
        
        .audio-wrapper { 
            position: fixed; 
            top: 30px; 
            left: 30px; 
            z-index: 100; 
            background: var(--glass); 
            border: 1px solid var(--border); 
            padding: 10px 15px; 
            border-radius: 25px; 
            backdrop-filter: var(--ios-blur); 
            display: flex; 
            align-items: center; 
            gap: 12px; 
            transition: 0.4s; 
            width: 45px; 
            overflow: hidden; 
            white-space: nowrap;
        }

        .audio-wrapper:hover { 
            width: 180px; 
            border-color: var(--teal); 
        }

        .volume-btn { 
            cursor: pointer; 
            color: white; 
            font-size: 1.2rem; 
            min-width: 25px; 
        }

        input[type=range] { 
            -webkit-appearance: none; 
            width: 100px; 
            background: transparent; 
            cursor: pointer; 
        }

        input[type=range]::-webkit-slider-runnable-track { 
            height: 6px; 
            background: rgba(255,255,255,0.1); 
            border-radius: 10px; 
        }

        input[type=range]::-webkit-slider-thumb { 
            height: 14px; 
            width: 14px; 
            border-radius: 50%; 
            background: var(--teal); 
            -webkit-appearance: none; 
            margin-top: -4px; 
            box-shadow: 0 0 10px var(--teal); 
        }

        .paladin-card { 
            width: 440px; 
            background: var(--glass); 
            backdrop-filter: var(--ios-blur); 
            border: 1px solid var(--border); 
            border-radius: 40px; 
            overflow: hidden; 
            box-shadow: 0 40px 100px rgba(0,0,0,0.8); 
            z-index: 5; 
            position: relative; 
        }

        .eye-counter { 
            position: absolute; 
            top: 20px; 
            left: -390px; 
            z-index: 999; 
            color: var(--role-bronze); 
            cursor: pointer; 
            font-size: 15px;
            filter: drop-shadow(0 0 5px #8b6b4c); 
            display: block !important;
        }

        .eye-counter.has-tooltip::after {
            top: calc(100% + 5px);
            bottom: auto;
            left: 97%;
            transform: translateX(-50%) translateY(0px);
        }

        .eye-counter.has-tooltip:hover::after {
            transform: translateX(-40%) translateY(0);
        }

        #user-banner { 
            width: 100%; 
            height: 120px; 
            background-size: cover; 
            background-position: center; 
            display: none; 
            border-bottom: 1px solid var(--border); 
        }

        .header { 
            display: flex; 
            align-items: flex-end; 
            gap: 20px; 
            padding: 30px; 
            margin-bottom: 0px; 
        }

        .has-banner .header { 
            margin-top: -60px; 
        } 

        .pfp-area { 
            position: relative; 
            width: 100px; 
            height: 100px; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            flex-shrink: 0; 
        }

        #pfp { 
            width: 100px; 
            height: 100px; 
            border-radius: 50%; 
            object-fit: cover; 
            z-index: 1; 
            border: 1px solid rgba(255,255,255,0.8); 
            background: #0c1117; 
        }

        #avatar-decoration { 
            position: absolute; 
            top: 2; 
            left: 5; 
            width: 120%; 
            height: 120%; 
            z-index: 2; 
            pointer-events: none; 
            display: none; 
        }

        .status-dot { 
            position: absolute; 
            bottom: 0px; 
            right: 8px; 
            width: 20px; 
            height: 20px; 
            border-radius: 50%; 
            border: 3px solid #0c1117; 
            z-index: 3; 
        }

        .name-and-status { 
            position: relative; 
            flex-grow: 1; 
            display: flex; 
            flex-direction: column; 
            align-items: flex-start; 
        }

        /* تعديل الاسم: لمعان وتوهج برونزي احترافي */
        #user-name { 
            margin: 5; 
            font-family: 'Syne'; 
            font-size: 2.2rem; 
            letter-spacing: 5px; 
            background: linear-gradient(90deg, #fff, #8b6b4c, #fff);
            background-size: 500%;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: shine 3s linear infinite;
            filter: drop-shadow(0 0 8px rgba(139, 107, 76, 0.5));
            cursor: pointer;
        }

        @keyframes shine { 
            to { background-position: 100% center; } 
        }

        .main-content { 
            padding: 0 30px 30px 30px; 
        }

        /* تعديل سبوتيفاي: تصميم زجاجي متطور */
        .spotify-container { 
            background: linear-gradient(135deg, rgba(30, 215, 96, 0.15) 0%, rgba(0, 0, 0, 0.4) 100%); 
            border: 1px solid rgba(30, 215, 96, 0.25); 
            border-radius: 22px; 
            padding: 15px; 
            margin-bottom: 20px; 
            display: none; 
            align-items: center; 
            gap: 15px; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            backdrop-filter: blur(10px);
        }

        #track-art { 
            width: 55px; 
            height: 55px; 
            border-radius: 50%; 
            border: 2px solid #1ed760; 
            animation: rotateArt 8s linear infinite; 
            box-shadow: 0 0 15px rgba(30, 215, 96, 0.2);
        }

        @keyframes rotateArt { 
            from { transform: rotate(0deg); } 
            to { transform: rotate(360deg); } 
        }

        .role-section { 
            display: flex; 
            justify-content: center; 
            margin-bottom: 20px; 
        }

        .role-box { 
            position: relative; 
            display: flex; 
            align-items: center; 
            gap: 15px; 
            background: rgba(139, 107, 76, 0.15); 
            padding: 3px 20px; 
            border-radius: 15px; 
            border: 2px solid rgba(139, 107, 76, 0.3); 
            cursor: pointer; 
            transition: 0.3s; 
        }

        .role-box:hover { 
            transform: scale(1.05); 
            background: rgba(139, 107, 76, 0.25); 
        }

.has-tooltip { 
    position: relative; 
    cursor: pointer; 
}

.has-tooltip::after {
    /* سحب النص من الـ HTML وإجباره على الظهور */
    content: attr(data-custom-tooltip) !important; 
    position: absolute;
    
    /* الموقع فوق الاسم بالضبط */
    bottom: calc(100% + 12px); 
    left: 50%;
    transform: translateX(-50%) translateY(10px);
    
    /* التصميم الزجاجي حقك */
    padding: 8px 16px;
    background: rgba(255, 255, 255, 0.05); /* زجاجي خفيف */
    border: 1px solid rgba(255, 255, 255, 0.1);
    border-radius: 12px;
    backdrop-filter: blur(15px);
    
    /* أهم تعديل: اللون الأبيض الواضح */
    color: #ffffff !important; 
    font-size: 0.75rem;
    font-weight: 800;
    white-space: nowrap;
    
    /* التحكم بالظهور */
    opacity: 0;
    pointer-events: none;
    transition: 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    z-index: 9999;
}

/* حركة الظهور عند لمس الاسم */
.has-tooltip:hover::after { 
    opacity: 1; 
    transform: translateX(-50%) translateY(0); 
}
        .badges-area { 
            display: flex; 
            gap: 15px; 
            justify-content: center; 
            margin-bottom: 15px; 
        }

        .badge-icon { 
            width: 22px; 
            height: 22px; 
            transition: 0.3s ease; 
        }

        .badge-wrapper:hover .badge-icon { 
            transform: scale(1.2) rotate(5deg); 
        }

        .social-grid { 
            display: grid; 
            grid-template-columns: repeat(4, 1fr); 
            gap: 10px; 
        }

        .grid-item { 
            background: rgba(255, 255, 255, 0.05); 
            border: 1px solid var(--border); 
            border-radius: 18px; 
            height: 55px; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            transition: 0.4s; 
            text-decoration: none; 
        }

        .grid-item:hover { 
            transform: translateY(-5px); 
            background: rgba(255, 255, 255, 0.1); 
            border-color: var(--teal); 
        }

        .grid-item img { 
            max-height: 32px; 
            border-radius: 5px; 
        }
    </style>
</head>
<body>
    <div id="particles-js"></div>

    <div class="audio-wrapper">
        <div class="volume-btn" onclick="togglePlay()"><i id="play-icon" class="fa-solid fa-play"></i></div>
        <input type="range" id="volume-slider" min="0" max="1" step="0.1" value="0.2" oninput="changeVolume(this.value)">
    </div>

    <div class="paladin-card" id="card-container">
        <div class="eye-counter has-tooltip" id="visitor-box" data-custom-tooltip="Private">
            <i class="fa-solid fa-eye"></i>
        </div>

        <div id="user-banner"></div>
        <div class="header">
            <div class="pfp-area has-tooltip" id="pfp-tooltip" data-custom-tooltip="جاري جلب الحالة...">
                <img id="pfp" src="" alt="L">
                <img id="avatar-decoration" src="" alt="Decoration">
                <div id="dot" class="status-dot"></div>
            </div>
<div class="name-and-status">
    <h1 id="user-name">Shan</h1>
</div>
        </div>

        <div class="main-content">
            <div id="spotify" class="spotify-container">
                <img id="track-art" src="">
                <div class="spotify-info">
                    <b id="track-name" style="display:block; font-size:0.85rem; color:#1ed760;"></b>
                    <span id="track-artist" style="font-size:0.75rem; color: rgba(255,255,255,0.7);"></span>
                </div>
            </div>

            <div class="role-section has-tooltip" data-custom-tooltip="Click to View MTA: High Management">
                <div class="role-box">
                    <img src="mta_badge.png" style="height: 30px;">
                    <span style="color: var(--role-bronze); font-weight: 800; font-size: 0.85rem;">MTA: High Management</span>
                </div>
            </div>

            <div class="badges-area">
                <div class="has-tooltip badge-wrapper" data-custom-tooltip="Originally known as LAHCEN#5790"><img src="username.png" class="badge-icon"></div>
                <div class="has-tooltip badge-wrapper" data-custom-tooltip="Completed a Quest"><img src="quest.png" class="badge-icon"></div>
                <div class="has-tooltip badge-wrapper" data-custom-tooltip="HypeSquad Bravery"><img src="hypesquadbravery.svg" class="badge-icon"></div>
                <div class="has-tooltip badge-wrapper" data-custom-tooltip="Orbs"><img src="orb.svg" class="badge-icon"></div>
            </div>

            <div class="social-grid">
                <a href="https://www.instagram.com/h29de" target="_blank" class="grid-item has-tooltip" data-custom-tooltip="Instagram: h29de"><i class="fa-brands fa-instagram" style="color: #E4405F; font-size: 1.4rem;"></i></a>
                <a href="https://seven7rp.xyz/" target="_blank" class="grid-item has-tooltip" data-custom-tooltip="SEVEN RP Website"><i class="fa-solid fa-shield-halved" style="color: var(--teal); font-size: 1.3rem;"></i></a>
                <a href="https://discord.com/users/1000017346250948708" target="_blank" class="grid-item has-tooltip" data-custom-tooltip="Discord Profile"><i class="fa-brands fa-discord" style="color: var(--role-bronze); font-size: 1.4rem;"></i></a>
                <a href="https://discord.gg/ZCjWNYxRmY" target="_blank" class="grid-item has-tooltip" data-custom-tooltip="Join SEVEN Discord"><img src="1335986910811918486.webp"></a>
            </div>
        </div>
    </div>

    <audio id="bg-music" loop><source src="your-music-file.mp3" type="audio/mpeg"></audio>

    <script src="https://cdn.jsdelivr.net/particles.js/2.0.0/particles.min.js"></script>
    <script>
        particlesJS("particles-js", {"particles":{"number":{"value":40},"color":{"value":"#8b6b4c"},"opacity":{"value":0.2},"size":{"value":2},"move":{"enable":true,"speed":0.8,"direction":"top"}}});
        
        const audio = document.getElementById('bg-music');
        const playIcon = document.getElementById('play-icon');
        let isPlaying = false;
        audio.volume = 0.2;

        function togglePlay() {
            if (isPlaying) { audio.pause(); playIcon.className = "fa-solid fa-play"; } 
            else { audio.play(); playIcon.className = "fa-solid fa-pause"; }
            isPlaying = !isPlaying;
        }

        function changeVolume(val) { audio.volume = val; }

        const ID = "1000017346250948708";
        async function update() {
            try {
                const r = await fetch(`https://api.lanyard.rest/v1/users/${ID}`);
                const { data } = await r.json();
                
                const bannerDiv = document.getElementById('user-banner');
                const cardCont = document.getElementById('card-container');
                if (data.discord_user.banner) {
                    bannerDiv.style.backgroundImage = `url(https://cdn.discordapp.com/banners/${ID}/${data.discord_user.banner}.png?size=1024)`;
                    bannerDiv.style.display = 'block';
                    cardCont.classList.add('has-banner');
                } else {
                    bannerDiv.style.display = 'none';
                    cardCont.classList.remove('has-banner');
                }

                document.getElementById('pfp').src = `https://cdn.discordapp.com/avatars/${ID}/${data.discord_user.avatar}.png?size=512`;
                
                const decorationImg = document.getElementById('avatar-decoration');
                if (data.discord_user.avatar_decoration_data) {
                    decorationImg.src = `https://cdn.discordapp.com/avatar-decoration-presets/${data.discord_user.avatar_decoration_data.asset}.png`;
                    decorationImg.style.display = 'block';
                }

                document.getElementById('user-name').innerText = data.discord_user.global_name;
                const statusColors = { online: '#34c759', idle: '#ffcc00', dnd: '#ff3b30', offline: '#8e8e93' };
                document.getElementById('dot').style.background = statusColors[data.discord_status];
                
                const pfpArea = document.getElementById('pfp-tooltip');
                const customStatus = data.activities.find(a => a.type === 4);

                if (customStatus) {
                    let emojiStr = "";
                    if (customStatus.emoji) { emojiStr = customStatus.emoji.name + " "; }
                    const statusContent = (emojiStr + (customStatus.state || "")).trim();
                    pfpArea.setAttribute('data-custom-tooltip', statusContent || data.discord_status.toUpperCase());
                } else {
                    pfpArea.setAttribute('data-custom-tooltip', data.discord_status.toUpperCase());
                }
                
                const sp = document.getElementById('spotify');
                if (data.listening_to_spotify) {
                    sp.style.display = 'flex';
                    document.getElementById('track-name').innerText = data.spotify.track;
                    document.getElementById('track-artist').innerText = data.spotify.artist;
                    document.getElementById('track-art').src = data.spotify.album_art_url;
                } else { sp.style.display = 'none'; }
            } catch (e) {}
        }
        setInterval(update, 5000); update();
    </script>
</body>
</html>

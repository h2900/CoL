<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Paladin Hub | Lahcen</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&family=Syne:wght@800&display=swap" rel="stylesheet">
    <script src="https://kit.fontawesome.com/fb2c907885.js" crossorigin="anonymous"></script>
    <style>
        :root { 
            --teal: #8b6b4c; 
            --border: rgba(255, 255, 255, 0.1); 
            --glass: rgba(10, 15, 20, 0.65); 
            --ios-blur: blur(30px) saturate(180%); 
            --role-bronze: #8b6b4c; 
        }

        body { margin: 0; padding: 0; background: #000 url('paladin-diablo-iv-3840x2160-25956.jpg') no-repeat center center fixed; background-size: cover; color: white; direction: rtl; font-family: 'Plus Jakarta Sans', sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; overflow: hidden; }
        #particles-js { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; }
        
        .audio-wrapper { position: fixed; top: 30px; left: 30px; z-index: 100; background: var(--glass); border: 1px solid var(--border); padding: 10px 15px; border-radius: 25px; backdrop-filter: var(--ios-blur); display: flex; align-items: center; gap: 12px; transition: 0.4s; width: 45px; overflow: hidden; white-space: nowrap;}
        .audio-wrapper:hover { width: 180px; border-color: var(--teal); }
        .volume-btn { cursor: pointer; color: white; font-size: 1.2rem; min-width: 25px; }
        input[type=range] { -webkit-appearance: none; width: 100px; background: transparent; cursor: pointer; }
        input[type=range]::-webkit-slider-runnable-track { height: 6px; background: rgba(255,255,255,0.1); border-radius: 10px; }
        input[type=range]::-webkit-slider-thumb { height: 14px; width: 14px; border-radius: 50%; background: var(--teal); -webkit-appearance: none; margin-top: -4px; box-shadow: 0 0 10px var(--teal); }

        .paladin-card { width: 440px; background: var(--glass); backdrop-filter: var(--ios-blur); border: 1px solid var(--border); border-radius: 40px; overflow: hidden; box-shadow: 0 40px 100px rgba(0,0,0,0.8); z-index: 5; position: relative; }

        /* إضافة البنر بدون تخريب الهيدر */
        #user-banner { width: 100%; height: 120px; background-size: cover; background-position: center; display: none; border-bottom: 1px solid var(--border); }

        .header { display: flex; align-items: flex-end; gap: 20px; padding: 30px; margin-bottom: 0px; }
        .has-banner .header { margin-top: -60px; } /* يرفع الصورة قليلاً إذا وجد بنر */

        .pfp-area { position: relative; width: 100px; height: 100px; display: flex; justify-content: center; align-items: center; flex-shrink: 0; }
        #pfp { width: 76px; height: 76px; border-radius: 50%; object-fit: cover; z-index: 1; border: 2px solid rgba(255,255,255,0.8); background: #0c1117; }
        #avatar-decoration { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 2; pointer-events: none; display: none; }
        .status-dot { position: absolute; bottom: 12px; right: 12px; width: 18px; height: 18px; border-radius: 50%; border: 3px solid #0c1117; z-index: 3; }

        .name-and-status { position: relative; flex-grow: 1; display: flex; flex-direction: column; align-items: flex-start; }
        .names h1 { margin: 0; font-family: 'Syne'; font-size: 2rem; letter-spacing: -1px; }

        .status-bubble {
            position: absolute;
            bottom: calc(100% + -6px);
            left: 65px;
            padding: 4px 18px;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 18px;
            backdrop-filter: blur(15px);
            opacity: 0;
            transform: translateY(10px) scale(0.9);
            transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            animation: statusPulse 4s infinite alternate;
            z-index: 10;
            white-space: nowrap;
        }
        .status-bubble.active { opacity: 1; transform: translateY(0) scale(1); }
        .status-bubble::after {
            content: '';
            position: absolute;
            top: 70%;
            left: 30px;
            width: 0; height: 0;
            border-style: solid;
            border-width: 12px 12px 0 0;
            border-color: rgba(255, 255, 255, 0.03) transparent transparent transparent;
        }

        @keyframes statusPulse {
            from { box-shadow: 0 0 5px rgba(139, 107, 76, 0.05); border-color: rgba(255, 255, 255, 0.08); }
            to { box-shadow: 0 0 20px rgba(139, 107, 76, 0.25); border-color: rgba(255, 255, 255, 0.2); }
        }
        #status-text { font-size: 0.85rem; font-weight: 700; color: #ddd; display: flex; align-items: center; gap: 8px; }

        .main-content { padding: 0 30px 30px 30px; }

        .spotify-container { background: rgba(30, 215, 96, 0.1); border: 1px solid rgba(30, 215, 96, 0.2); border-radius: 20px; padding: 12px; margin-bottom: 20px; display: none; align-items: center; gap: 15px; }
        #track-art { width: 50px; height: 50px; border-radius: 50%; border: 2px solid #1ed760; animation: rotateArt 8s linear infinite; }
        @keyframes rotateArt { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

        .role-section { display: flex; justify-content: center; margin-bottom: 20px; }
        .role-box { position: relative; display: flex; align-items: center; gap: 12px; background: rgba(139, 107, 76, 0.15); padding: 10px 20px; border-radius: 18px; border: 1px solid rgba(139, 107, 76, 0.3); cursor: pointer; transition: 0.3s; }
        .role-box:hover { transform: scale(1.05); background: rgba(139, 107, 76, 0.25); }

        .has-tooltip { position: relative; cursor: pointer; }
        .has-tooltip::after {
            content: attr(data-custom-tooltip);
            position: absolute;
            bottom: calc(100% + 15px);
            left: 50%;
            transform: translateX(-50%) translateY(10px);
            padding: 8px 16px;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 12px;
            backdrop-filter: blur(15px);
            color: #eee;
            font-size: 0.75rem;
            font-weight: 700;
            white-space: nowrap;
            opacity: 0;
            pointer-events: none;
            transition: 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            z-index: 20;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        .has-tooltip:hover::after { opacity: 1; transform: translateX(-50%) translateY(0); }

        .badges-area { display: flex; gap: 15px; justify-content: center; margin-bottom: 15px; }
        .badge-icon { width: 22px; height: 22px; transition: 0.3s ease; }
        .badge-wrapper:hover .badge-icon { transform: scale(1.2) rotate(5deg); }

        .social-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; }
        .grid-item { background: rgba(255, 255, 255, 0.05); border: 1px solid var(--border); border-radius: 18px; height: 55px; display: flex; align-items: center; justify-content: center; transition: 0.4s; text-decoration: none; }
        .grid-item:hover { transform: translateY(-5px); background: rgba(255, 255, 255, 0.1); border-color: var(--teal); }
        .grid-item img { max-height: 32px; border-radius: 5px; }
    </style>
</head>
<body>
    <div id="particles-js"></div>

    <div class="audio-wrapper">
        <div class="volume-btn" onclick="togglePlay()"><i id="play-icon" class="fa-solid fa-play"></i></div>
        <input type="range" id="volume-slider" min="0" max="1" step="0.1" value="0.2" oninput="changeVolume(this.value)">
    </div>

    <div class="paladin-card" id="card-container">
        <div id="user-banner"></div>
        <div class="header">
            <div class="pfp-area">
                <img id="pfp" src="" alt="L">
                <img id="avatar-decoration" src="" alt="Decoration">
                <div id="dot" class="status-dot"></div>
            </div>
            <div class="name-and-status">
                <div class="status-bubble" id="status-bubble">
                    <span id="status-text">...</span>
                </div>
                <h1 id="user-name">Lahcen</h1>
            </div>
        </div>

        <div class="main-content">
            <div id="spotify" class="spotify-container">
                <img id="track-art" src=""><div class="spotify-info"><b id="track-name" style="display:block; font-size:0.85rem; color:#1ed760;"></b><span id="track-artist" style="font-size:0.75rem;"></span></div>
            </div>

            <div class="role-section has-tooltip" data-custom-tooltip="Click to View MTA: High Management">
                <div class="role-box">
                    <img src="mta_badge.png" style="height: 30px;">
                    <span style="color: var(--role-bronze); font-weight: 800; font-size: 0.85rem;">MTA: High Management</span>
                </div>
            </div>

            <div class="badges-area">
                <div class="has-tooltip badge-wrapper" data-custom-tooltip="Originally known as LAHCEN#5790"><img src="username.png" class="badge-icon"></div>
                <div class="has-tooltip badge-wrapper" data-custom-tooltip="Completed a Quest"><img src="quest.png" class="badge-icon"></div>
                <div class="has-tooltip badge-wrapper" data-custom-tooltip="HypeSquad Bravery"><img src="hypesquadbravery.svg" class="badge-icon"></div>
                <div class="has-tooltip badge-wrapper" data-custom-tooltip="Active Developer"><img src="orb.svg" class="badge-icon"></div>
            </div>

            <div class="social-grid">
                <a href="https://www.instagram.com/h29de" target="_blank" class="grid-item has-tooltip" data-custom-tooltip="Instagram: h29de"><i class="fa-brands fa-instagram" style="color: #E4405F; font-size: 1.4rem;"></i></a>
                <a href="https://seven7rp.xyz/" target="_blank" class="grid-item has-tooltip" data-custom-tooltip="SEVEN RP Website"><i class="fa-solid fa-shield-halved" style="color: var(--teal); font-size: 1.3rem;"></i></a>
                <a href="https://discord.com/users/1000017346250948708" target="_blank" class="grid-item has-tooltip" data-custom-tooltip="Discord Profile"><i class="fa-brands fa-discord" style="color: var(--role-bronze); font-size: 1.4rem;"></i></a>
                <a href="https://discord.gg/ZCjWNYxRmY" target="_blank" class="grid-item has-tooltip" data-custom-tooltip="Join SEVEN Discord"><img src="1335986910811918486.webp"></a>
            </div>
        </div>
    </div>

    <audio id="bg-music" loop><source src="your-music-file.mp3" type="audio/mpeg"></audio>

    <script src="https://cdn.jsdelivr.net/particles.js/2.0.0/particles.min.js"></script>
    <script>
        particlesJS("particles-js", {"particles":{"number":{"value":40},"color":{"value":"#8b6b4c"},"opacity":{"value":0.2},"size":{"value":2},"move":{"enable":true,"speed":0.8,"direction":"top"}}});
        
        const audio = document.getElementById('bg-music');
        const playIcon = document.getElementById('play-icon');
        let isPlaying = false;
        audio.volume = 0.2;

        function togglePlay() {
            if (isPlaying) { audio.pause(); playIcon.className = "fa-solid fa-play"; } 
            else { audio.play(); playIcon.className = "fa-solid fa-pause"; }
            isPlaying = !isPlaying;
        }

        function changeVolume(val) { audio.volume = val; }

        const ID = "1000017346250948708";
        async function update() {
            try {
                const r = await fetch(`https://api.lanyard.rest/v1/users/${ID}`);
                const { data } = await r.json();
                
                // تحديث البنر
                const bannerDiv = document.getElementById('user-banner');
                const cardCont = document.getElementById('card-container');
                if (data.discord_user.banner) {
                    bannerDiv.style.backgroundImage = `url(https://cdn.discordapp.com/banners/${ID}/${data.discord_user.banner}.png?size=1024)`;
                    bannerDiv.style.display = 'block';
                    cardCont.classList.add('has-banner');
                } else {
                    bannerDiv.style.display = 'none';
                    cardCont.classList.remove('has-banner');
                }

                document.getElementById('pfp').src = `https://cdn.discordapp.com/avatars/${ID}/${data.discord_user.avatar}.png?size=512`;
                
                const decorationImg = document.getElementById('avatar-decoration');
                if (data.discord_user.avatar_decoration_data) {
                    decorationImg.src = `https://cdn.discordapp.com/avatar-decoration-presets/${data.discord_user.avatar_decoration_data.asset}.png`;
                    decorationImg.style.display = 'block';
                }

                document.getElementById('user-name').innerText = data.discord_user.global_name;
                const statusColors = { online: '#34c759', idle: '#ffcc00', dnd: '#ff3b30', offline: '#8e8e93' };
                document.getElementById('dot').style.background = statusColors[data.discord_status];
                
                const statusBubble = document.getElementById('status-bubble');
                const statusText = document.getElementById('status-text');
                const customStatus = data.activities.find(a => a.type === 4);
                
                if (customStatus && customStatus.state) {
                    const emoji = customStatus.emoji ? `<img src="https://cdn.discordapp.com/emojis/${customStatus.emoji.id}.webp" style="height: 1.2rem; margin-right:5px;"> ` : '';
                    statusText.innerHTML = `${emoji}${customStatus.state}`;
                    statusBubble.classList.add('active');
                } else {
                    statusBubble.classList.remove('active');
                }
                
                const sp = document.getElementById('spotify');
                if (data.listening_to_spotify) {
                    sp.style.display = 'flex';
                    document.getElementById('track-name').innerText = data.spotify.track;
                    document.getElementById('track-artist').innerText = data.spotify.artist;
                    document.getElementById('track-art').src = data.spotify.album_art_url;
                } else { sp.style.display = 'none'; }
            } catch (e) {}
        }
        setInterval(update, 5000); update();
    </script>
</body>
</html>
